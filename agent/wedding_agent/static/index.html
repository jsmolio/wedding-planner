<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #3a3a3a;
      height: 100dvh;
      display: flex;
      background: #f5ebe6;
    }

    /* ── Left panel: hero imagery ─────────────────────────────── */

    .hero-panel {
      display: none;
      flex-direction: column;
      width: 420px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 960px) {
      .hero-panel { display: flex; }
    }

    .hero-img {
      width: 100%;
      flex: 1;
      object-fit: cover;
    }

    .hero-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(183,110,121,0.15) 0%,
        rgba(183,110,121,0.35) 100%
      );
      pointer-events: none;
    }

    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2.5rem 2rem;
      z-index: 1;
      background: linear-gradient(transparent, rgba(0,0,0,0.45));
      color: #fff;
    }

    .hero-overlay h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 500;
      font-style: italic;
      font-size: 1.75rem;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .hero-overlay p {
      font-size: 0.85rem;
      opacity: 0.85;
      line-height: 1.5;
    }

    /* ── Right panel: chat ────────────────────────────────────── */

    #chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-width: 0;
      background: #fdf9f8;
    }

    header {
      padding: 1.1rem 1.5rem;
      background: linear-gradient(135deg, #b76e79 0%, #c9929b 100%);
      color: #fff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header .logo-ring {
      width: 36px;
      height: 36px;
      opacity: 0.9;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 500;
      font-size: 1.3rem;
      letter-spacing: 0.01em;
    }

    header .subtitle {
      font-size: 0.75rem;
      opacity: 0.8;
      margin-left: auto;
      font-weight: 400;
    }

    /* ── Welcome card ─────────────────────────────────────────── */

    .welcome {
      margin: 1.25rem 1.25rem 0;
      padding: 1.25rem;
      background: linear-gradient(135deg, #faf0ee, #f5e6e8);
      border-radius: 1rem;
      border: 1px solid #ecdcdc;
      text-align: center;
    }

    .welcome-img {
      width: 100%;
      max-height: 140px;
      object-fit: cover;
      border-radius: 0.75rem;
      margin-bottom: 1rem;
    }

    .welcome h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 500;
      font-size: 1.15rem;
      color: #8c5059;
      margin-bottom: 0.4rem;
    }

    .welcome p {
      font-size: 0.82rem;
      color: #7a6a6e;
      line-height: 1.5;
    }

    .welcome .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
      margin-top: 0.9rem;
    }

    .welcome .suggestions button {
      background: #fff;
      border: 1px solid #dcc8cb;
      border-radius: 2rem;
      padding: 0.35rem 0.85rem;
      font-size: 0.78rem;
      color: #8c5059;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .welcome .suggestions button:hover {
      background: #b76e79;
      color: #fff;
      border-color: #b76e79;
    }

    /* ── Messages area ────────────────────────────────────────── */

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #dcc8cb; border-radius: 3px; }

    .message {
      max-width: 80%;
      padding: 0.7rem 1rem;
      border-radius: 1.1rem;
      line-height: 1.55;
      font-size: 0.9rem;
      word-wrap: break-word;
      animation: fadeUp 0.25s ease-out;
    }

    .message.user { white-space: pre-wrap; }

    /* ── Markdown inside agent messages ───────────────────────── */

    .message.agent p { margin: 0.3rem 0; }
    .message.agent p:first-child { margin-top: 0; }
    .message.agent p:last-child { margin-bottom: 0; }
    .message.agent ul, .message.agent ol {
      margin: 0.3rem 0 0.3rem 1.25rem;
      padding: 0;
    }
    .message.agent li { margin: 0.15rem 0; }
    .message.agent li > ul, .message.agent li > ol { margin: 0.1rem 0 0.1rem 1rem; }
    .message.agent h3, .message.agent h4 {
      font-size: 0.88rem;
      font-weight: 600;
      margin: 0.6rem 0 0.2rem;
      color: #5c4a4e;
    }
    .message.agent h3:first-child, .message.agent h4:first-child { margin-top: 0; }
    .message.agent strong { font-weight: 600; }
    .message.agent code {
      background: #f5ebe6;
      padding: 0.1rem 0.35rem;
      border-radius: 0.3rem;
      font-size: 0.82rem;
    }
    .message.agent table {
      border-collapse: collapse;
      margin: 0.4rem 0;
      font-size: 0.82rem;
      width: 100%;
    }
    .message.agent th, .message.agent td {
      border: 1px solid #ecdcdc;
      padding: 0.3rem 0.5rem;
      text-align: left;
    }
    .message.agent th { background: #faf0ee; font-weight: 600; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #b76e79, #c48a92);
      color: #fff;
      border-bottom-right-radius: 0.3rem;
      box-shadow: 0 2px 8px rgba(183,110,121,0.2);
    }

    .message.agent {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #ecdcdc;
      border-bottom-left-radius: 0.3rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .message.error {
      align-self: center;
      background: #fce4e4;
      color: #9e2b2b;
      font-size: 0.82rem;
      border-radius: 0.5rem;
    }

    .typing {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 0.75rem 1.1rem;
      background: #fff;
      border: 1px solid #ecdcdc;
      border-radius: 1.1rem;
      border-bottom-left-radius: 0.3rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      animation: fadeUp 0.25s ease-out;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #c48a92;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Confirmation banner ──────────────────────────────────── */

    .confirm-banner {
      align-self: flex-start;
      max-width: 85%;
      background: linear-gradient(135deg, #fef9f0, #fdf3e7);
      border: 1px solid #e8d5b8;
      border-radius: 1rem;
      padding: 1rem 1.15rem;
      animation: fadeUp 0.25s ease-out;
    }

    .confirm-banner .confirm-icon {
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
    }

    .confirm-banner p {
      font-size: 0.85rem;
      color: #5c4a2e;
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }

    .confirm-banner .confirm-actions {
      display: flex;
      gap: 0.5rem;
    }

    .confirm-banner button {
      padding: 0.4rem 1.1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .confirm-banner .btn-approve {
      background: #5a8a5e;
      color: #fff;
    }
    .confirm-banner .btn-approve:hover { background: #4a7a4e; }

    .confirm-banner .btn-reject {
      background: #fff;
      color: #8c5059;
      border: 1px solid #dcc8cb;
    }
    .confirm-banner .btn-reject:hover { background: #fce4e4; }

    .confirm-banner button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Input bar ────────────────────────────────────────────── */

    #input-bar {
      display: flex;
      gap: 0.6rem;
      padding: 0.85rem 1.25rem;
      background: #fff;
      border-top: 1px solid #ecdcdc;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 1px solid #ddd;
      border-radius: 1.5rem;
      padding: 0.65rem 1rem;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.4;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #user-input:focus {
      border-color: #b76e79;
      box-shadow: 0 0 0 3px rgba(183,110,121,0.1);
    }

    #send-btn {
      align-self: flex-end;
      background: linear-gradient(135deg, #b76e79, #c48a92);
      color: #fff;
      border: none;
      border-radius: 1.5rem;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(183,110,121,0.25);
    }

    #send-btn:hover { transform: scale(1.05); box-shadow: 0 3px 10px rgba(183,110,121,0.35); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <!-- Left panel: visible on wider screens -->
  <div class="hero-panel">
    <img
      class="hero-img"
      src="https://images.unsplash.com/photo-1519741497674-611481863552?w=840&q=80"
      alt="Wedding flowers and table setting"
    >
    <div class="hero-overlay">
      <h2>Your perfect day, thoughtfully planned</h2>
      <p>Ask about guests, budgets, timelines, etiquette &mdash; your AI wedding assistant is here to help.</p>
    </div>
  </div>

  <!-- Right panel: chat -->
  <div id="chat-container">
    <header>
      <!-- Rings icon -->
      <svg class="logo-ring" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="26" r="12" stroke="#fff" stroke-width="2.2" fill="none" opacity="0.9"/>
        <circle cx="30" cy="26" r="12" stroke="#fff" stroke-width="2.2" fill="none" opacity="0.9"/>
        <path d="M15 14 L18 10 L21 14" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="18" cy="9" r="1.5" fill="#fff" opacity="0.7"/>
      </svg>
      <h1>Wedding Planner</h1>
      <span class="subtitle">AI Assistant</span>
    </header>

    <div id="messages">
      <!-- Welcome card -->
      <div class="welcome" id="welcome-card">
        <img
          class="welcome-img"
          src="https://images.unsplash.com/photo-1507504031003-b417219a0fde?w=700&q=80"
          alt="Elegant wedding bouquet"
        >
        <h2>Welcome to your wedding planner</h2>
        <p>I can help with guest lists, budgets, checklists, etiquette, and more. What would you like to know?</p>
        <div class="suggestions">
          <button type="button">How's the guest list?</button>
          <button type="button">What's our budget?</button>
          <button type="button">Upcoming tasks</button>
          <button type="button">Etiquette tips</button>
        </div>
      </div>
    </div>

    <form id="input-bar">
      <textarea id="user-input" placeholder="Ask about your wedding..." rows="1"></textarea>
      <button type="submit" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const form = document.getElementById('input-bar');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcomeCard = document.getElementById('welcome-card');
    const threadId = crypto.randomUUID();

    // ── Markdown setup ──────────────────────────────────────────

    marked.setOptions({ breaks: true, gfm: true });

    function renderMarkdown(text) {
      return marked.parse(text);
    }

    // ── Helpers ────────────────────────────────────────────────

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'agent') {
        div.innerHTML = renderMarkdown(text);
      } else {
        div.textContent = text;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addStreamingMessage() {
      const div = document.createElement('div');
      div.className = 'message agent';
      div._rawText = '';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function appendStreamToken(div, token) {
      div._rawText += token;
      div.innerHTML = renderMarkdown(div._rawText);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function hideWelcome() {
      if (!welcomeCard) return;
      welcomeCard.style.transition = 'opacity 0.2s, max-height 0.3s';
      welcomeCard.style.opacity = '0';
      welcomeCard.style.maxHeight = '0';
      welcomeCard.style.overflow = 'hidden';
      welcomeCard.style.margin = '0';
      welcomeCard.style.padding = '0';
      setTimeout(() => welcomeCard.remove(), 300);
    }

    // ── Confirmation banner ───────────────────────────────────

    function showConfirmation(message) {
      const banner = document.createElement('div');
      banner.className = 'confirm-banner';
      banner.innerHTML = `
        <div class="confirm-icon">&#x1f6e1;&#xfe0f;</div>
        <p>${message}</p>
        <div class="confirm-actions">
          <button class="btn-approve" data-action="approve">Approve</button>
          <button class="btn-reject" data-action="reject">Reject</button>
        </div>
      `;
      messagesEl.appendChild(banner);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      banner.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          // Disable buttons
          banner.querySelectorAll('button').forEach(b => b.disabled = true);
          btn.textContent = action === 'approve' ? 'Approved...' : 'Rejected...';
          handleConfirmation(action);
        });
      });
    }

    async function handleConfirmation(action) {
      showTyping();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ thread_id: threadId, confirm: action }),
        });
        hideTyping();
        if (!res.ok) throw new Error(`Server error (${res.status})`);
        const data = await res.json();
        if (data.reply) addMessage(data.reply, 'agent');
      } catch (err) {
        hideTyping();
        addMessage(err.message, 'error');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // ── Streaming ─────────────────────────────────────────────

    async function sendMessageStreaming(text) {
      text = text.trim();
      if (!text) return;
      hideWelcome();

      addMessage(text, 'user');
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, thread_id: threadId, stream: true }),
        });

        if (!res.ok) throw new Error(`Server error (${res.status})`);

        hideTyping();
        const msgDiv = addStreamingMessage();
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          // Process complete SSE lines
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line in buffer

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = JSON.parse(line.slice(6));

            if (payload.type === 'token') {
              appendStreamToken(msgDiv, payload.content);
            } else if (payload.type === 'confirm') {
              // Remove empty streaming message if no tokens arrived
              if (!msgDiv._rawText) msgDiv.remove();
              showConfirmation(payload.confirm_message);
              return; // don't re-enable send until confirmation handled
            } else if (payload.type === 'done') {
              // Streaming complete
            }
          }
        }

        // Remove empty message if agent returned nothing visible
        if (!(msgDiv._rawText || '').trim()) msgDiv.remove();

      } catch (err) {
        hideTyping();
        addMessage(err.message, 'error');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // ── Event listeners ───────────────────────────────────────

    // Suggestion chip clicks
    document.querySelectorAll('.suggestions button').forEach(btn => {
      btn.addEventListener('click', () => sendMessageStreaming(btn.textContent));
    });

    // Auto-grow textarea
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      sendMessageStreaming(input.value);
    });

    input.focus();
  </script>
</body>
</html>
